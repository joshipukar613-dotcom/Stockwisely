<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Report</title>
<style>
  .container{max-width:800px;margin:0 auto;font-family:Arial,sans-serif;color:#333}
  .header{background:#6366f1;color:#fff;padding:20px;text-align:center}
  .content{background:#fff;border:1px solid #e5e7eb;border-top:none;padding:24px}
  .section{margin-bottom:16px}
  .title{font-weight:bold;margin-bottom:8px}
  .meta{font-size:14px;color:#555}
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Weekly Report</h1>
    </div>
    <div class="content">
      <div class="section"><div class="title">Sales</div><div class="meta">{{weekly_sales}}</div></div>
      <div class="section"><div class="title">Top Products</div><div class="meta">{{top_products}}</div></div>
      <div class="section"><div class="title">Expiry Alerts</div><div class="meta">{{expiry_alerts}}</div></div>
      <div class="section"><div class="title">Payment Status</div><div class="meta">{{payment_status}}</div></div>
    </div>
  </div>
</body>
</html>
