<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Out of Stock</title>
<style>
  .container{max-width:600px;margin:0 auto;font-family:Arial,sans-serif;color:#333}
  .header{background:#ef4444;color:#fff;padding:20px;text-align:center}
  .content{background:#fff;border:1px solid #e5e7eb;border-top:none;padding:24px}
  .btn{display:inline-block;background:#ef4444;color:#fff;padding:12px 20px;text-decoration:none;border-radius:6px}
  .meta{font-size:14px;color:#555}
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>URGENT: Out of Stock</h1>
    </div>
    <div class="content">
      <p>Product: {{product}}</p>
      <p class="meta">Last sale date: {{last_sale_date}} • Avg daily sales: {{avg_daily_sales}}</p>
      <p><a href="{{restock_url}}" class="btn">Restock Immediately</a></p>
    </div>
  </div>
</body>
</html>
