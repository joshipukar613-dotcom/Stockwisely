<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Target Exceeded</title>
<style>
  .container{max-width:600px;margin:0 auto;font-family:Arial,sans-serif;color:#333}
  .header{background:#22c55e;color:#fff;padding:20px;text-align:center}
  .content{background:#fff;border:1px solid #e5e7eb;border-top:none;padding:24px}
  .btn{display:inline-block;background:#22c55e;color:#fff;padding:12px 20px;text-decoration:none;border-radius:6px}
  .meta{font-size:14px;color:#555}
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Monthly Target Exceeded!</h1>
    </div>
    <div class="content">
      <p class="meta">Target: {{target}} • Actual: {{actual}} • Achieved: {{percent}}%</p>
      <p class="meta">Top products: {{top_products}}</p>
      <p><a href="{{report_url}}" class="btn">View Report</a></p>
    </div>
  </div>
</body>
</html>
